<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torn 行业公司数据查询</title>
  <style>
    <!--INJECT_CSS-->
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 搜索框 -->
    <div class="app-header">
      <h1>Torn 行业公司数据查询</h1>
      <div class="search-form">
        <div class="form-item">
          <label for="industry-select">行业</label>
          <select id="industry-select"></select>
        </div>
        <div class="api-key-row">
          <div class="form-item">
            <label for="apikey-input">API Key (Public)</label>
<input type="password" id="apikey-input" placeholder="输入 Torn Public API Key"
              autocomplete="off" />
          </div>
          <div class="btn-group">
            <button class="btn btn-warning" type="button" onclick="saveApiKey()">💾 保存</button>
            <button class="btn btn-danger" type="button" onclick="clearApiKey()">🗑 清除</button>
          </div>
        </div>
        <div class="btn-group">
          <div>
            <label style="display:block;margin-bottom:4px;font-size:13px;color:#888;">&zwnj;</label>
            <button class="btn btn-primary" id="query-btn" onclick="doQuery()">查询</button>
          </div>
          <div>
            <label style="display:block;margin-bottom:4px;font-size:13px;color:#888;">&zwnj;</label>
            <button class="btn btn-success" id="analysis-btn" onclick="showAnalysis()" disabled>📊 星级分析</button>
          </div>
        </div>
      </div>
      <!-- 搜索栏（数据加载后才显示） -->
      <div id="search-bar" style="display:none; margin-top: 14px;">
        <input type="text" id="search-input" placeholder="🔍 搜索公司名称或 ID..."
          style="width:100%;padding:9px 14px;font-size:14px;border:1px solid #d9d9d9;border-radius:6px;outline:none;"
          oninput="debounceSearch(this.value)" />
      </div>
    </div>

    <!-- 内容区 -->
    <div class="table-container" id="content-area">
      <div class="empty-box">
        <div class="icon">📊</div>
        <p>请选择行业并输入 API Key，点击「查询」开始获取数据</p>
      </div>
    </div>
  </div>

  <!-- 分析弹窗 -->
  <div class="modal-overlay" id="analysis-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">行业星级分布分析</h2>
        <button class="modal-close" onclick="closeAnalysis()" aria-label="关闭">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    <!--INJECT_JS-->
  </script>
</body>
</html>
